<html lang="nl">
<head>

  <meta name="viewport" content="width=1920">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      font-family: 'Montserrat', 'Arial', sans-serif;
      background: #000;
    }


    #vp {
      position: absolute; top: 0; left: 0;
      width: 1920px; height: 1080px;
      transform-origin: top left;
    }

    .screen {
      position: absolute; top: 0; left: 0;
      width: 1920px; height: 1080px;
      background: url('verkiezingen achtergrond.png') center/cover no-repeat;
    }

    /* ══════════════════════════════════════
       KAARTSCHERM
    ══════════════════════════════════════ */
    #map-screen {
      background-size: 130%;
    }

    /* Paginatitel */
    #map-title {
      position: absolute;
      top: 26px; left: 0; width: 1920px;
      text-align: center;
      font-size: 48px; font-weight: 800;
      color: #002a02;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-shadow:
        0 0 30px rgba(255,255,255,1),
        0 0 14px rgba(255,255,255,0.85);
      z-index: 30; pointer-events: none;
    }

    /*
      Kaart-inhoud (overlays + hotspots) 60px omlaag verschoven
      zodat de paginatitel vrij boven de kaart staat.
    */
    #map-content {
      position: absolute; top: 0; left: 0;
      width: 1920px; height: 1080px;
      transform: translateY(60px);
    }

    #map-wrap {
      position: absolute; top: 0; left: 0;
      width: 1920px; height: 1080px;
      transform: scale(1.3);
      transform-origin: center center;
      pointer-events: none;
    }

    .map-img {
      position: absolute; top: 0; left: 0;
      width: 1920px; height: 1080px;
      opacity: 1;
      pointer-events: none;
      transition: filter 0.6s ease;
    }
    /* Bezochte plaatsen worden donkergroen (#002a02) */
    .map-img.visited {
      filter: brightness(0) invert(1) sepia(1) saturate(1000%) hue-rotate(91deg) brightness(0.16);
    }

    /* Klikgebieden – geen visuele feedback */
    .hotspot {
      display: none;
    }

    /* Logo rechtsonder – klikbaar als knop voor totaaloverzicht */
    #map-logo {
      position: absolute; bottom: 24px; right: 30px;
      height: 72px; opacity: 0.88; z-index: 30;
      transition: opacity 0.18s, transform 0.15s;
    }
    #map-logo:hover { opacity: 1; transform: scale(1.06); }

    /* ══════════════════════════════════════
       UITSLAGSCHERM
    ══════════════════════════════════════ */
    #results-screen { display: none; }

    #results-veil {
      position: absolute; top: 0; left: 0;
      width: 1920px; height: 1080px;
      background: rgba(255,255,255,0.18);
    }

    #place-title {
      position: absolute; top: 38px; left: 0; width: 1920px;
      text-align: center;
      font-size: 72px; font-weight: 800;
      color: #002a02;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      text-shadow:
        0 0 24px rgba(255,255,255,1),
        0 0 10px rgba(255,255,255,0.7);
      z-index: 10; pointer-events: none;
    }

    /* ─── CHART AREA ─── */
    #chart-area {
      position: absolute;
      top: 85px; left: 30px;
      width: 1860px; height: 870px;
      display: flex;
      align-items: flex-end;
      justify-content: space-evenly;
      padding-bottom: 150px;
      z-index: 5;
    }

    .party-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      max-width: 182px;
      user-select: none;
      -webkit-user-select: none;
    }

    .bars-box {
      width: 132px; height: 490px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 2px;
      position: relative;
    }
    .bars-box::before {
      content: '';
      position: absolute;
      bottom: 0; left: 4px; right: 4px;
      height: 1px;
      background: rgba(0,42,2,0.18);
    }

    .bar {
      width: 60px;
      border-radius: 5px 5px 0 0;
      position: relative;
      min-height: 0;
      transition: height 0.75s cubic-bezier(.17,.67,0,1.02);
    }
    .bar-2021 { opacity: 0.58; order: 1; transition: height 1.5s cubic-bezier(0.22, 1, 0.36, 1); }
    .bar-2026 {
      order: 2;
      opacity: 0;
      transition: height 1.5s cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 0.45s ease;
    }
    .bar-2026.show { opacity: 1; }

    .bar-pct {
      position: absolute;
      top: -26px; left: 50%;
      transform: translateX(-50%);
      font-size: 12px; font-weight: 700;
      color: #002a02;
      white-space: nowrap;
      pointer-events: none;
      text-shadow: 0 0 6px rgba(255,255,255,1), 0 0 10px rgba(255,255,255,0.8);
    }

    .diff-badge {
      margin-top: 10px;
      width: 148px; min-height: 32px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800;
      color: #fff;
      background: rgba(0,42,2,0.10);
      letter-spacing: 0.04em;
      opacity: 0;
      transition: opacity 0.3s, background 0.4s;
    }
    .diff-badge.visible   { opacity: 1; }
    .diff-badge.winst     { background: #16a34a; color: #fff; }
    .diff-badge.verlies   { background: #b91c1c; color: #fff; }

    /* Aparte witte box voor het percentage – vaste hoogte, altijd op gelijke hoogte */
    .pct-box {
      margin-top: 8px;
      width: 148px;
      height: 40px;
      background: rgba(255,255,255,0.82);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }

    .pct-26-val {
      font-size: 21px; font-weight: 800;
      color: #002a02;
      letter-spacing: 0.04em;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .pct-26-val.visible { opacity: 1; }

    /* Aparte witte box voor de partijnaam – vaste hoogte voor 1- én 2-regel namen */
    .name-box {
      margin-top: 6px;
      width: 148px;
      height: 74px;
      background: rgba(255,255,255,0.82);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      padding: 6px 10px;
    }

    .p-name {
      font-size: 23px; font-weight: 700;
      color: #002a02;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      line-height: 1.2;
    }

    #total-box {
      position: absolute; bottom: 84px; right: 44px;
      text-align: right; z-index: 10;
      font-family: 'Montserrat', 'Arial', sans-serif;
      font-size: 30px; font-weight: 600;
      color: #002a02;
      letter-spacing: 0.04em;
      text-shadow: 0 0 12px rgba(255,255,255,0.9), 0 0 6px rgba(255,255,255,0.7);
      line-height: 1.4;
    }
    #total-row-2026 { font-size: 33px; font-weight: 700; }

    #nav-btns {
      position: absolute; bottom: 18px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 24px; z-index: 20;
    }
    .nbtn {
      width: 64px; height: 64px; border-radius: 50%;
      border: 2px solid rgba(0,42,2,0.45);
      background: rgba(255,255,255,0.55);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.18s, border-color 0.18s, transform 0.15s;
      backdrop-filter: blur(4px);
      user-select: none;
      outline: none;
    }
    .nbtn:hover {
      background: rgba(255,255,255,0.88);
      border-color: #002a02;
      transform: scale(1.10);

    .nbtn svg { width: 28px; height: 28px; fill: #002a02; }

    #dip-overlay {
      position: absolute; top: 0; left: 0;
      width: 1920px; height: 1080px;
      background: #fff;
      opacity: 0; pointer-events: none;
      z-index: 9999;
      transition: opacity 0.36s ease;
    }
    #dip-overlay.show { opacity: 1; pointer-events: all; }

const D21_TOTAAL = (function () {
  const tot = { t: 0 };
  PARTIES.forEach(p => { tot[p.id] = 0; });
  Object.values(D21).forEach(d => {
    PARTIES.forEach(p => { tot[p.id] += d[p.id] || 0; });
    tot.t += d.t || 0;
  });
  return tot;
})();

/* ── State ── */
const visitedPlaces = new Set();
let curPlace  = null;
let d26       = {};
let total26   = 0;
let revealed  = false;
let sortMode  = false;
let colOrder  = PARTIES.map(p => p.id);
let pollTimer = null;

/* ══════════════════════════════════════
   OPTEL-ANIMATIE (voor diff-badges)
══════════════════════════════════════ */
function countUp(el, target, duration, isInt, suffix, sign) {
  sign   = sign   || '';
  suffix = suffix || '';
  const t0 = performance.now();
  function step(now) {
    const progress = Math.min((now - t0) / duration, 1);
    const ease     = 1 - Math.pow(1 - progress, 3);
    const current  = target * ease;
    el.textContent = sign + (isInt
      ? Math.round(current).toLocaleString('nl-NL')
      : current.toFixed(1)) + suffix;
    if (progress < 1) requestAnimationFrame(step);
    else el.textContent = sign + (isInt
      ? target.toLocaleString('nl-NL')
      : target.toFixed(1)) + suffix;
  }
  requestAnimationFrame(step);
}

/* ══════════════════════════════════════
   KAART – PIXEL-KLIKDETECTIE
══════════════════════════════════════ */
const _placeCtx = new Map();

function initMapHitDetection() {
  document.querySelectorAll('#map-wrap .map-img').forEach(img => {
    const place = img.dataset.place;
    const canvas = document.createElement('canvas');
    canvas.width = 1920; canvas.height = 1080;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const draw = () => { try { ctx.drawImage(img, 0, 0, 1920, 1080); _placeCtx.set(place, ctx); } catch(e) {} };
    if (img.complete && img.naturalWidth) draw();
    else img.addEventListener('load', draw);
  });

  const wrap = document.getElementById('map-wrap');
  wrap.style.pointerEvents = 'auto';
  wrap.addEventListener('click', e => {
    if (document.getElementById('map-screen').style.display === 'none') return;
    const rect = wrap.getBoundingClientRect();
    const imgX = Math.floor((e.clientX - rect.left) / rect.width  * 1920);
    const imgY = Math.floor((e.clientY - rect.top)  / rect.height * 1080);
    for (const [place, ctx] of _placeCtx) {
      try {
        if (ctx.getImageData(imgX, imgY, 1, 1).data[3] > 10) {
          openPlace(place);
          return;
        }
      } catch(e) {}
    }
  });
}

initMapHitDetection();

document.getElementById('map-logo').addEventListener('click', openTotaal);

/* ══════════════════════════════════════
   OVERGANG
══════════════════════════════════════ */
function dip(cb) {
  const ov = document.getElementById('dip-overlay');
  ov.classList.add('show');
  setTimeout(() => { cb(); setTimeout(() => ov.classList.remove('show'), 60); }, 380);
}

/* ══════════════════════════════════════
   OPEN PLAATS
══════════════════════════════════════ */
function openPlace(place) {
  curPlace = place; revealed = false; sortMode = false;
  colOrder = PARTIES.map(p => p.id);
  d26 = {}; total26 = 0;

  dip(() => {
    document.getElementById('map-screen').style.display     = 'none';
    document.getElementById('results-screen').style.display = 'block';
    document.getElementById('place-title').textContent       = place.replace(/_/g, ' ');
    document.getElementById('total-votes').textContent       = '—';
    document.getElementById('total-diff').textContent        = '—';
    buildChart();
    fetchSheetData(place);
    clearInterval(pollTimer);
    pollTimer = setInterval(() => fetchSheetData(place), POLL_MS);
  });
}

/* ══════════════════════════════════════
   OPEN TOTAALOVERZICHT
══════════════════════════════════════ */
function openTotaal() {
  curPlace = '__totaal__'; revealed = false; sortMode = false;
  colOrder = PARTIES.map(p => p.id);
  d26 = {}; total26 = 0;

  dip(() => {
    document.getElementById('map-screen').style.display     = 'none';
    document.getElementById('results-screen').style.display = 'block';
    document.getElementById('place-title').textContent       = 'Land van Cuijk';
    document.getElementById('total-votes').textContent       = '—';
    document.getElementById('total-diff').textContent        = '—';
    buildChart();
    fetchAllSheets();
    clearInterval(pollTimer);
    pollTimer = setInterval(fetchAllSheets, POLL_MS);
  });
}

/* ══════════════════════════════════════
   GOOGLE SHEETS – ÉÉN GEMEENTE
══════════════════════════════════════ */
function fetchSheetData(place) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(place)}`;
  fetch(url, { cache: 'no-store' })
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(text => {
      const m   = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)\s*;?\s*$/);
      const obj = JSON.parse(m ? m[1] : text.replace(/^[^{]*/, '').replace(/[^}]*$/, ''));
      parseSheet(obj);
    })
    .catch(e => console.warn('[Sheets]', place, e.message));
}

function parseSheet(resp) {
  if (!resp?.table) return;
  const parsed = parseSheetToData(resp);
  if (!Object.keys(parsed.d).length && parsed.t === 0) return;

  d26 = parsed.d; total26 = parsed.t;
  updateBars();
  updateTotalBox(parsed.t);
}

/* ══════════════════════════════════════
   GOOGLE SHEETS – ALLE GEMEENTES (TOTAAL)
══════════════════════════════════════ */
let _totaalFetchSeq = 0;

function fetchAllSheets() {
  const mySeq = ++_totaalFetchSeq;
  const aggD  = {};
  PARTIES.forEach(p => { aggD[p.id] = 0; });
  let aggT    = 0;
  let pending = PLACES.length;

  PLACES.forEach(place => {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(place)}`;
    fetch(url, { cache: 'no-store' })
      .then(r => r.text())
      .then(text => {
        if (mySeq !== _totaalFetchSeq) return;
        const m   = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)\s*;?\s*$/);
        const obj = JSON.parse(m ? m[1] : text.replace(/^[^{]*/, '').replace(/[^}]*$/, ''));
        const parsed = parseSheetToData(obj);
        PARTIES.forEach(p => { aggD[p.id] += parsed.d[p.id] || 0; });
        aggT += parsed.t;
      })
      .catch(() => {})
      .finally(() => {
        if (mySeq !== _totaalFetchSeq) return;
        pending--;
        if (pending === 0) {
          d26 = aggD; total26 = aggT;
          updateBars();
          updateTotalBox(aggT);
        }
      });
  });
}

function updateTotalBox(votes26) {
  document.getElementById('total-votes').textContent = votes26 > 0 ? votes26.toLocaleString('nl-NL') : '—';
  const dd21   = curPlace === '__totaal__' ? D21_TOTAAL : (D21[curPlace] || {});
  const t21raw = dd21.t || 0;
  if (votes26 > 0 && t21raw > 0) {
    const diff = votes26 - t21raw;
    const sign = diff > 0 ? '+' : '';
    document.getElementById('total-diff').textContent = sign + diff.toLocaleString('nl-NL');
  } else {
    document.getElementById('total-diff').textContent = '—';
  }
}

function parseSheetToData(resp) {
  if (!resp?.table) return { d: {}, t: 0 };
  const { cols, rows } = resp.table;
  if (!cols?.length || !rows?.length) return { d: {}, t: 0 };

  const colMap = {};
  cols.forEach((c, i) => {
    const pid = labelToPid((c.label || '').toLowerCase().trim());
    if (pid && !(pid in colMap)) colMap[pid] = i;
  });

  let totRow = null;
  for (let i = rows.length - 1; i >= 0; i--) {
    const r = rows[i];
    if (!r?.c) continue;
    const v = String(r.c[0]?.v ?? '').toLowerCase().trim();
    if (v === 'totaal' || v.startsWith('totaal')) { totRow = r; break; }
  }
  if (!totRow) totRow = rows[rows.length - 1];
  if (!totRow?.c) return { d: {}, t: 0 };

  const newD = {}; let newT = 0;
  Object.entries(colMap).forEach(([pid, ci]) => {
    const v   = parseFloat(totRow.c[ci]?.v) || 0;
    newD[pid] = (newD[pid] || 0) + v; newT += v;
  });
  if (!Object.keys(newD).length) {
    PARTIES.forEach((p, i) => {
      const v    = parseFloat(totRow.c[i + 1]?.v) || 0;
      newD[p.id] = v; newT += v;
    });
  }
  return { d: newD, t: newT };
}

function labelToPid(lbl) {
  for (const p of PARTIES)
    for (const k of p.keys)
      if (lbl === k || lbl.includes(k)) return p.id;
  return null;
}

/* ══════════════════════════════════════
   CHART OPBOUWEN
══════════════════════════════════════ */
function buildChart() {
  const area = document.getElementById('chart-area');
  area.innerHTML = '';
  const dd21   = curPlace === '__totaal__' ? D21_TOTAAL : (D21[curPlace] || {});
  const t21raw = dd21.t || 0;
  const t21    = t21raw || 1;
  document.getElementById('total-21').textContent =
    t21raw > 0 ? t21raw.toLocaleString('nl-NL') : '—';

  colOrder.forEach((pid, orderIdx) => {
    const party = PARTIES.find(p => p.id === pid);
    if (!party) return;
    const v21   = dd21[pid] || 0;
    const pct21 = t21 > 0 ? v21 / t21 : 0;
    const h21   = Math.round(pct21 * MAX_H);

    const col = document.createElement('div');
    col.className   = 'party-col';
    col.dataset.pid = pid;
    col.style.order = orderIdx;

    col.innerHTML = `
      <div class="bars-box">
        <div class="bar bar-2021" id="b21-${pid}" data-h21="${h21}" style="height:0px;background:${party.color}">
          <span class="bar-pct">${pct21>0.001?(pct21*100).toFixed(1)+'%':''}</span>
        </div>
        <div class="bar bar-2026" id="b26-${pid}" style="height:5px;background:${party.color}">
          <span class="bar-pct" id="lbl26-${pid}"></span>
        </div>
      </div>
      <div class="diff-badge" id="diff-${pid}"></div>
      <div class="pct-box" style="outline:1px solid #002a02">
        <div class="pct-26-val" id="val26-${pid}"></div>
      </div>
      <div class="name-box" style="outline:1px solid #002a02">
        <div class="p-name">${party.name}</div>
      </div>
    `;
    col.addEventListener('click', () => revealOne(pid));
    area.appendChild(col);
  });

  /* Animeer 2021-staven: van links naar rechts, 5 frames (~83ms) vertraging per kolom */
  requestAnimationFrame(() => {
    area.querySelectorAll('.bar-2021').forEach((bar, i) => {
      setTimeout(() => {
        bar.style.height = bar.dataset.h21 + 'px';
      }, i * 83);
    });
  });

  if (total26 > 0) updateBars();
}

/* ── Update staafhoogten & data ── */
function updateBars() {
  if (!curPlace) return;
  const dd21 = curPlace === '__totaal__' ? D21_TOTAAL : (D21[curPlace] || {});
  const t21  = dd21.t || 1;

  PARTIES.forEach(({ id: pid }) => {
    const b26  = document.getElementById(`b26-${pid}`);
    if (!b26) return;
    const v26   = d26[pid] || 0;
    const v21   = dd21[pid] || 0;
    const pct26 = total26 > 0 ? v26 / total26 : 0;
    const pct21 = t21 > 0 ? v21 / t21 : 0;
    const diff  = pct26 - pct21;

    b26.style.height = `${Math.round(pct26 * MAX_H)}px`;

    const lbl = document.getElementById(`lbl26-${pid}`);
    if (lbl) lbl.textContent = total26 > 0 && pct26 > 0.001 ? (pct26*100).toFixed(1)+'%' : '';

    const badge = document.getElementById(`diff-${pid}`);
    if (badge && total26 > 0) {
      const sign = diff > 5e-4 ? '+' : (diff < -5e-4 ? '-' : '');
      badge.dataset.target    = Math.abs(diff * 100).toFixed(1);
      badge.dataset.sign      = sign;
      badge.dataset.className = 'diff-badge' + (diff > 5e-4 ? ' winst' : diff < -5e-4 ? ' verlies' : '');
      if (badge.classList.contains('visible')) {
        badge.className = badge.dataset.className + ' visible';
        badge.textContent = sign + badge.dataset.target + '%';
      }
    }
    const valEl = document.getElementById(`val26-${pid}`);
    if (valEl && total26 > 0) {
      valEl.dataset.target = (pct26 * 100).toFixed(1);
      if (valEl.classList.contains('visible')) {
        valEl.textContent = valEl.dataset.target + '%';
      }
    }

    if (revealed) revealOneSilent(pid);
  });
}

/* ── Onthul één partij met animatie ── */
function revealOne(pid) {
  const b26 = document.getElementById(`b26-${pid}`);
  if (b26 && b26.classList.contains('show')) return;   // al zichtbaar, niet opnieuw animeren
  if (b26) {
    const targetH  = b26.style.height;
    const pct      = parseFloat(targetH) / MAX_H;          // 0–1 relatief aan MAX_H
    const dur      = Math.min(2.0, Math.max(0.4, (pct / 0.30) * 2.0)).toFixed(2);
    b26.style.transition = 'none';
    b26.style.height = '0px';
    b26.classList.add('show');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      b26.style.transition = `height ${dur}s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.45s ease`;
      b26.style.height = targetH;
    }));
  }

  const badge = document.getElementById(`diff-${pid}`);
  if (badge && badge.dataset.target) {
    badge.className = badge.dataset.className + ' visible';
    countUp(badge, parseFloat(badge.dataset.target), 900, false, '%', badge.dataset.sign || '');
  }

  const valEl = document.getElementById(`val26-${pid}`);
  if (valEl && valEl.dataset.target) {
    valEl.classList.add('visible');
    countUp(valEl, parseFloat(valEl.dataset.target), 900, false, '%', '');
  }
}

function revealOneSilent(pid) {
  document.getElementById(`b26-${pid}`)?.classList.add('show');
  const badge = document.getElementById(`diff-${pid}`);
  if (badge && badge.dataset.target) {
    badge.className = badge.dataset.className + ' visible';
    badge.textContent = (badge.dataset.sign || '') + badge.dataset.target + '%';
  }
  const valEl = document.getElementById(`val26-${pid}`);
  if (valEl && valEl.dataset.target) {
    valEl.classList.add('visible');
    valEl.textContent = valEl.dataset.target + '%';
  }
}

function revealAll() {
  revealed = true;
  PARTIES.forEach(p => revealOne(p.id));
}

/* ══════════════════════════════════════
   SORTEREN – FLIP-ANIMATIE 2 SECONDEN
══════════════════════════════════════ */
function toggleSort() {
  const dd21 = curPlace === '__totaal__' ? D21_TOTAAL : (D21[curPlace] || {});
  const t21  = dd21.t || 1;

  const cols    = Array.from(document.querySelectorAll('.party-col'));
  const beforeX = {};
  cols.forEach(col => { beforeX[col.dataset.pid] = col.getBoundingClientRect().left; });

  sortMode = !sortMode;
  if (sortMode) {
    colOrder = [...PARTIES].sort((a, b) => {
      const va = total26 > 0 ? (d26[a.id]||0) : (dd21[a.id]||0)/t21;
      const vb = total26 > 0 ? (d26[b.id]||0) : (dd21[b.id]||0)/t21;
      return vb - va;
    }).map(p => p.id);
  } else {
    colOrder = PARTIES.map(p => p.id);
  }

  colOrder.forEach((pid, i) => {
    const col = document.querySelector(`.party-col[data-pid="${pid}"]`);
    if (col) col.style.order = i;
  });

  const afterX = {};
  cols.forEach(col => { afterX[col.dataset.pid] = col.getBoundingClientRect().left; });

  cols.forEach(col => {
    const pid = col.dataset.pid;
    const dx  = (beforeX[pid] || 0) - (afterX[pid] || 0);
    if (Math.abs(dx) < 0.5) return;
    col.style.transition = 'none';
    col.style.transform  = `translateX(${dx}px)`;
    void col.offsetWidth;
    col.style.transition = 'transform 2s cubic-bezier(0.22, 1, 0.36, 1)';
    col.style.transform  = 'translateX(0)';
    col.addEventListener('transitionend', () => {
      col.style.transition = '';
      col.style.transform  = '';
    }, { once: true });
  });
}

/* ══════════════════════════════════════
   NAVIGATIE
══════════════════════════════════════ */
document.getElementById('btn-back').addEventListener('click', () => {
  clearInterval(pollTimer);
  const placeToMark = curPlace;
  dip(() => {
    document.getElementById('results-screen').style.display = 'none';
    document.getElementById('map-screen').style.display     = 'block';
    if (placeToMark && placeToMark !== '__totaal__') {
      visitedPlaces.add(placeToMark);
      const img = document.querySelector(`.map-img[data-place="${placeToMark}"]`);
      if (img) img.classList.add('visited');
    }
    curPlace = null;
  });
});
document.getElementById('btn-all').addEventListener('click',  revealAll);
document.getElementById('btn-sort').addEventListener('click', toggleSort);

<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Gemeenteraadsverkiezingen 2026 – Land van Cuijk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      font-family: 'Montserrat', 'Arial', sans-serif;
      background: #000;
    }

    #vp {
      position: absolute; top: 0; left: 0;
      width: 1920px; height: 1080px;
      transform-origin: top left;
    }

    .screen {
      position: absolute; top: 0; left: 0;
      width: 1920px; height: 1080px;
      background: url('verkiezingen achtergrond.png') center/cover no-repeat;
    }

    /* ══════════════════════════════════════
       KAARTSCHERM – kaart 30% vergroot
    ══════════════════════════════════════ */
    #map-screen {
      /* Achtergrond ook 30% groter zodat ze gelijk lopen */
      background-size: 130%;
    }

    #map-wrap {
      position: absolute; top: 0; left: 0;
      width: 1920px; height: 1080px;
      /* Vergroot de overlay-afbeeldingen met 30% vanuit het midden */
      transform: scale(1.3);
      transform-origin: center center;
      pointer-events: none;
    }

    /* Transparante PNG-overlays (99.5% transparant, alleen glow) */
    .map-img {
      position: absolute; top: 0; left: 0;
      width: 1920px; height: 1080px;
      opacity: 1;
      pointer-events: none;
    }

    /* Onzichtbare klikgebieden – plaatsnamen verwijderd */
    .hotspot {
      position: absolute;
      transform: translate(-50%, -50%);
      width: 65px; height: 65px;
      cursor: pointer;
      z-index: 20;
      /* volledig transparant, geen tekst, geen hover-effect */
      background: transparent;
      border: none;
    }

    /* Logo */
    #map-logo {
      position: absolute; bottom: 24px; right: 30px;
      height: 72px; opacity: 0.88; z-index: 30;
    }

    /* ══════════════════════════════════════
       UITSLAGSCHERM – zelfde achtergrond als beginscherm
    ══════════════════════════════════════ */
    #results-screen { display: none; }

    /* Subtiele lichte was voor leesbaarheid */
    #results-veil {
      position: absolute; top: 0; left: 0;
      width: 1920px; height: 1080px;
      background: rgba(255,255,255,0.18);
    }

    /* Plaatsnaam – 20px lager dan vorige versie, groter */
    #place-title {
      position: absolute; top: 38px; left: 0; width: 1920px;
      text-align: center;
      font-size: 72px; font-weight: 800;
      color: #002a02;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      text-shadow:
        0 0 24px rgba(255,255,255,1),
        0 0 10px rgba(255,255,255,0.7);
      z-index: 10; pointer-events: none;
    }

    /* ─── CHART AREA ─── */
    #chart-area {
      position: absolute;
      top: 135px; left: 30px;
      width: 1860px; height: 870px;
      display: flex;
      align-items: flex-end;
      justify-content: space-evenly;
      padding-bottom: 150px;
      z-index: 5;
    }

    .party-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      flex: 1;
      max-width: 182px;
    }
    .party-col:hover { filter: brightness(1.04); }

    /* Container staven – verkleinde tussenruimte, staven tegen elkaar */
    .bars-box {
      width: 132px; height: 490px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 2px;   /* staven bijna tegen elkaar */
      position: relative;
    }
    .bars-box::before {
      content: '';
      position: absolute;
      bottom: 0; left: 4px; right: 4px;
      height: 1px;
      background: rgba(0,42,2,0.18);
    }

    .bar {
      width: 60px;
      border-radius: 5px 5px 0 0;
      position: relative;
      min-height: 5px;
      transition: height 0.75s cubic-bezier(.17,.67,0,1.02);
    }
    .bar-2021 { opacity: 0.58; order: 1; }
    .bar-2026 {
      order: 2;
      opacity: 0;
      transition: height 0.75s cubic-bezier(.17,.67,0,1.02),
                  opacity 0.45s ease;
    }
    .bar-2026.show { opacity: 1; }

    /* Percentage boven staaf */
    .bar-pct {
      position: absolute;
      top: -26px; left: 50%;
      transform: translateX(-50%);
      font-size: 12px; font-weight: 700;
      color: #002a02;
      white-space: nowrap;
      pointer-events: none;
      text-shadow: 0 0 6px rgba(255,255,255,1), 0 0 10px rgba(255,255,255,0.8);
    }

    /* Verschil badge – VERBORGEN tot klik, tekst wit */
    .diff-badge {
      margin-top: 10px;
      width: 136px; min-height: 32px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800;
      color: #fff;
      background: rgba(0,42,2,0.10);
      letter-spacing: 0.04em;
      transition: background 0.4s;
      /* verborgen tot klik */
      opacity: 0;
      transition: opacity 0.3s, background 0.4s;
    }
    .diff-badge.visible   { opacity: 1; }
    .diff-badge.winst     { background: #16a34a; color: #fff; }
    .diff-badge.verlies   { background: #b91c1c; color: #fff; }

    /* 2026 percentage – VERBORGEN tot klik */
    .pct-26-val {
      margin-top: 7px;
      font-size: 21px; font-weight: 800;
      color: #002a02;
      letter-spacing: 0.04em;
      min-height: 28px;
      text-shadow: 0 0 8px rgba(255,255,255,0.9), 0 0 4px rgba(255,255,255,0.6);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .pct-26-val.visible { opacity: 1; }

    .p-name {
      margin-top: 5px;
      font-size: 13px; font-weight: 700;
      color: #002a02;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      line-height: 1.25;
      text-shadow: 0 0 8px rgba(255,255,255,0.9), 0 0 4px rgba(255,255,255,0.6);
    }

    /* Totaal stemmen */
    #total-box {
      position: absolute; bottom: 84px; right: 44px;
      text-align: right; z-index: 10;
    }
    #total-label {
      font-size: 13px; font-weight: 600;
      color: #002a02;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(255,255,255,0.9);
    }
    #total-votes {
      font-size: 52px; font-weight: 800;
      color: #002a02;
      letter-spacing: 0.06em;
      text-shadow: 0 0 20px rgba(255,255,255,0.9), 0 0 8px rgba(255,255,255,0.7);
    }

    /* Navigatieknoppen */
    #nav-btns {
      position: absolute; bottom: 18px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 24px; z-index: 20;
    }
    .nbtn {
      width: 64px; height: 64px; border-radius: 50%;
      border: 2px solid rgba(0,42,2,0.45);
      background: rgba(255,255,255,0.55);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, transform 0.15s;
      backdrop-filter: blur(4px);
      user-select: none;
    }
    .nbtn:hover {
      background: rgba(255,255,255,0.88);
      border-color: #002a02;
      transform: scale(1.10);
    }
    .nbtn svg { width: 28px; height: 28px; fill: #002a02; }

    /* Overgangsoverlay */
    #dip-overlay {
      position: absolute; top: 0; left: 0;
      width: 1920px; height: 1080px;
      background: #fff;
      opacity: 0; pointer-events: none;
      z-index: 9999;
      transition: opacity 0.36s ease;
    }
    #dip-overlay.show { opacity: 1; pointer-events: all; }

  </style>
</head>

/* ── State ── */
let curPlace  = null;
let d26       = {};
let total26   = 0;
let revealed  = false;
let sortMode  = false;
let colOrder  = PARTIES.map(p => p.id);
let pollTimer = null;

/* ══════════════════════════════════════
   OPTEL-ANIMATIE
══════════════════════════════════════ */
/**
 * Animate a numeric value counting up from 0 to `target`.
 * @param {HTMLElement} el
 * @param {number}      target      – eindwaarde
 * @param {number}      duration    – milliseconden
 * @param {boolean}     isInt       – true = geheel getal, false = 1 decimaal
 * @param {string}      suffix      – bijv. '%' of ''
 * @param {string}      sign        – '+', '-', of ''
 */
function countUp(el, target, duration, isInt, suffix, sign) {
  sign   = sign   || '';
  suffix = suffix || '';
  const t0 = performance.now();

  function step(now) {
    const progress = Math.min((now - t0) / duration, 1);
    const ease     = 1 - Math.pow(1 - progress, 3); // cubic ease-out
    const current  = target * ease;

    el.textContent = sign + (isInt
      ? Math.round(current).toLocaleString('nl-NL')
      : current.toFixed(1)) + suffix;

    if (progress < 1) requestAnimationFrame(step);
    else el.textContent = sign + (isInt
      ? target.toLocaleString('nl-NL')
      : target.toFixed(1)) + suffix;
  }
  requestAnimationFrame(step);
}

/* ══════════════════════════════════════
   KAART – KLIK (geen hover meer)
══════════════════════════════════════ */
document.querySelectorAll('.hotspot').forEach(el => {
  el.addEventListener('click', () => openPlace(el.dataset.place));
});

/* ══════════════════════════════════════
   OVERGANG
══════════════════════════════════════ */
function dip(cb) {
  const ov = document.getElementById('dip-overlay');
  ov.classList.add('show');
  setTimeout(() => { cb(); setTimeout(() => ov.classList.remove('show'), 60); }, 380);
}

/* ══════════════════════════════════════
   OPEN PLAATS
══════════════════════════════════════ */
function openPlace(place) {
  curPlace = place; revealed = false; sortMode = false;
  colOrder = PARTIES.map(p => p.id);
  d26 = {}; total26 = 0;

  dip(() => {
    document.getElementById('map-screen').style.display     = 'none';
    document.getElementById('results-screen').style.display = 'block';
    document.getElementById('place-title').textContent       = place;
    document.getElementById('total-votes').textContent       = '—';
    buildChart();
    fetchSheetData(place);
    clearInterval(pollTimer);
    pollTimer = setInterval(() => fetchSheetData(place), POLL_MS);
  });
}

/* ══════════════════════════════════════
   GOOGLE SHEETS
══════════════════════════════════════ */
function fetchSheetData(place) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(place)}`;
  fetch(url, { cache: 'no-store' })
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(text => {
      const m   = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)\s*;?\s*$/);
      const obj = JSON.parse(m ? m[1] : text.replace(/^[^{]*/, '').replace(/[^}]*$/, ''));
      parseSheet(obj);
    })
    .catch(e => console.warn('[Sheets]', place, e.message));
}

function parseSheet(resp) {
  if (!resp?.table) return;
  const { cols, rows } = resp.table;
  if (!cols?.length || !rows?.length) return;

  const colMap = {};
  cols.forEach((c, i) => {
    const pid = labelToPid((c.label || '').toLowerCase().trim());
    if (pid && !(pid in colMap)) colMap[pid] = i;
  });

  let totRow = null;
  for (let i = rows.length - 1; i >= 0; i--) {
    const r = rows[i];
    if (!r?.c) continue;
    const v = String(r.c[0]?.v ?? '').toLowerCase().trim();
    if (v === 'totaal' || v.startsWith('totaal')) { totRow = r; break; }
  }
  if (!totRow) totRow = rows[rows.length - 1];
  if (!totRow?.c) return;

  const newD = {}; let newT = 0;
  Object.entries(colMap).forEach(([pid, ci]) => {
    const v    = parseFloat(totRow.c[ci]?.v) || 0;
    newD[pid]  = (newD[pid] || 0) + v; newT += v;
  });
  if (!Object.keys(newD).length) {
    PARTIES.forEach((p, i) => {
      const v    = parseFloat(totRow.c[i + 1]?.v) || 0;
      newD[p.id] = v; newT += v;
    });
  }

  const wasZero = total26 === 0;
  d26 = newD; total26 = newT;
  updateBars();

  /* Totaal stemmen optellen-animatie */
  const tvEl = document.getElementById('total-votes');
  if (newT > 0) countUp(tvEl, newT, 1200, true, '', '');
  else tvEl.textContent = '—';
}

function labelToPid(lbl) {
  for (const p of PARTIES)
    for (const k of p.keys)
      if (lbl === k || lbl.includes(k)) return p.id;
  return null;
}

/* ══════════════════════════════════════
   CHART OPBOUWEN
══════════════════════════════════════ */
function buildChart() {
  const area = document.getElementById('chart-area');
  area.innerHTML = '';
  const dd21 = D21[curPlace] || {};
  const t21  = dd21.t || 1;

  colOrder.forEach((pid, orderIdx) => {
    const party = PARTIES.find(p => p.id === pid);
    if (!party) return;
    const v21   = dd21[pid] || 0;
    const pct21 = t21 > 0 ? v21 / t21 : 0;
    const h21   = Math.round(pct21 * MAX_H);

    const col = document.createElement('div');
    col.className   = 'party-col';
    col.dataset.pid = pid;
    col.style.order = orderIdx;

    /* Geen gekleurde strepen, geen jaar-labels onder staven */
    col.innerHTML = `
      <div class="bars-box">
        <div class="bar bar-2021" id="b21-${pid}" style="height:${h21}px;background:${party.color}">
          <span class="bar-pct">${pct21>0.001?(pct21*100).toFixed(1)+'%':''}</span>
        </div>
        <div class="bar bar-2026" id="b26-${pid}" style="height:5px;background:${party.color}">
          <span class="bar-pct" id="lbl26-${pid}"></span>
        </div>
      </div>
      <div class="diff-badge" id="diff-${pid}"></div>
      <div class="pct-26-val" id="val26-${pid}"></div>
      <div class="p-name">${party.name}</div>
    `;
    col.addEventListener('click', () => revealOne(pid));
    area.appendChild(col);
  });

  if (total26 > 0) updateBars();
}

/* ── Update staafhoogten & data zonder reveal ── */
function updateBars() {
  if (!curPlace) return;
  const dd21 = D21[curPlace] || {};
  const t21  = dd21.t || 1;

  PARTIES.forEach(({ id: pid }) => {
    const b26  = document.getElementById(`b26-${pid}`);
    if (!b26) return;
    const v26   = d26[pid] || 0;
    const v21   = dd21[pid] || 0;
    const pct26 = total26 > 0 ? v26 / total26 : 0;
    const pct21 = t21 > 0 ? v21 / t21 : 0;
    const diff  = pct26 - pct21;

    /* Staafhoogte */
    b26.style.height = `${Math.max(5, Math.round(pct26 * MAX_H))}px`;

    /* Label boven 2026-staaf */
    const lbl = document.getElementById(`lbl26-${pid}`);
    if (lbl) lbl.textContent = total26 > 0 && pct26 > 0.001 ? (pct26*100).toFixed(1)+'%' : '';

    /* Sla doelwaarden op als data-attributen voor de klik-animatie */
    const badge = document.getElementById(`diff-${pid}`);
    if (badge && total26 > 0) {
      const sign = diff > 5e-4 ? '+' : (diff < -5e-4 ? '-' : '');
      badge.dataset.target    = Math.abs(diff * 100).toFixed(1);
      badge.dataset.sign      = sign;
      badge.dataset.className = 'diff-badge' + (diff > 5e-4 ? ' winst' : diff < -5e-4 ? ' verlies' : '');
    }
    const valEl = document.getElementById(`val26-${pid}`);
    if (valEl && total26 > 0) {
      valEl.dataset.target = (pct26 * 100).toFixed(1);
    }

    /* Als al onthuld: direct bijwerken */
    if (revealed) revealOneSilent(pid);
  });
}

/* ── Onthul één partij met animatie ── */
function revealOne(pid) {
  /* 2026-staaf tonen */
  document.getElementById(`b26-${pid}`)?.classList.add('show');

  /* Verschil-badge: kleur direct, getal telt op */
  const badge = document.getElementById(`diff-${pid}`);
  if (badge && badge.dataset.target) {
    badge.className = badge.dataset.className + ' visible';
    const target = parseFloat(badge.dataset.target);
    const sign   = badge.dataset.sign || '';
    countUp(badge, target, 900, false, '%', sign);
  }

  /* 2026-percentage telt op */
  const valEl = document.getElementById(`val26-${pid}`);
  if (valEl && valEl.dataset.target) {
    valEl.classList.add('visible');
    countUp(valEl, parseFloat(valEl.dataset.target), 900, false, '%', '');
  }
}

/* Stille versie voor bij reeds-onthulde herordening */
function revealOneSilent(pid) {
  document.getElementById(`b26-${pid}`)?.classList.add('show');
  const badge = document.getElementById(`diff-${pid}`);
  if (badge && badge.dataset.target) {
    badge.className = badge.dataset.className + ' visible';
    const sign = badge.dataset.sign || '';
    badge.textContent = sign + badge.dataset.target + '%';
  }
  const valEl = document.getElementById(`val26-${pid}`);
  if (valEl && valEl.dataset.target) {
    valEl.classList.add('visible');
    valEl.textContent = valEl.dataset.target + '%';
  }
}

function revealAll() {
  revealed = true;
  PARTIES.forEach(p => revealOne(p.id));
}

/* ══════════════════════════════════════
   SORTEREN – FLIP-ANIMATIE 2 SECONDEN
══════════════════════════════════════ */
function toggleSort() {
  const dd21 = D21[curPlace] || {};
  const t21  = dd21.t || 1;

  /* Posities vóór herordening */
  const cols    = Array.from(document.querySelectorAll('.party-col'));
  const beforeX = {};
  cols.forEach(col => { beforeX[col.dataset.pid] = col.getBoundingClientRect().left; });

  sortMode = !sortMode;
  if (sortMode) {
    colOrder = [...PARTIES].sort((a, b) => {
      const va = total26 > 0 ? (d26[a.id]||0) : (dd21[a.id]||0)/t21;
      const vb = total26 > 0 ? (d26[b.id]||0) : (dd21[b.id]||0)/t21;
      return vb - va;
    }).map(p => p.id);
  } else {
    colOrder = PARTIES.map(p => p.id);
  }

  /* Nieuwe CSS order toepassen */
  colOrder.forEach((pid, i) => {
    const col = document.querySelector(`.party-col[data-pid="${pid}"]`);
    if (col) col.style.order = i;
  });

  /* Posities na herordening */
  const afterX = {};
  cols.forEach(col => { afterX[col.dataset.pid] = col.getBoundingClientRect().left; });

  /* FLIP animatie */
  cols.forEach(col => {
    const pid = col.dataset.pid;
    const dx  = (beforeX[pid] || 0) - (afterX[pid] || 0);
    if (Math.abs(dx) < 0.5) return;
    col.style.transition = 'none';
    col.style.transform  = `translateX(${dx}px)`;
    void col.offsetWidth;
    col.style.transition = 'transform 2s cubic-bezier(0.22, 1, 0.36, 1)';
    col.style.transform  = 'translateX(0)';
    col.addEventListener('transitionend', () => {
      col.style.transition = '';
      col.style.transform  = '';
    }, { once: true });
  });
}

/* ══════════════════════════════════════
   NAVIGATIE
══════════════════════════════════════ */
document.getElementById('btn-back').addEventListener('click', () => {
  clearInterval(pollTimer);
  dip(() => {
    document.getElementById('results-screen').style.display = 'none';
    document.getElementById('map-screen').style.display     = 'block';
    curPlace = null;
  });
});
document.getElementById('btn-all').addEventListener('click',  revealAll);
document.getElementById('btn-sort').addEventListener('click', toggleSort);

# ── Nginx configuratie voor WebSocket proxy ──────────────────────────────────
#
# Voeg dit blok toe aan het bestaande server-blok van claude.mediaextreme.nl
# (doorgaans in /etc/nginx/sites-available/claude.mediaextreme.nl of
#  /etc/nginx/conf.d/claude.mediaextreme.nl.conf)
#
# Voorwaarde: Node.js server draait op dezelfde machine op poort 8080:
#   node server.js
#
# Daarna: nginx -t && systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    server_name claude.mediaextreme.nl;

    # SSL – pas paden aan als Let's Encrypt elders staat
    ssl_certificate     /etc/letsencrypt/live/claude.mediaextreme.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/claude.mediaextreme.nl/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Statische bestanden (bestaand) ───────────────────────────────────────
    root  /var/www/claude.mediaextreme.nl;   # ← pas aan naar jouw webroot
    index index.html;

    # ── WebSocket proxy → Node.js server ─────────────────────────────────────
    location /ws {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;   # verbinding open houden
        proxy_send_timeout 3600s;
    }

    # ── /pair-code API → Node.js server ──────────────────────────────────────
    location /pair-code {
        proxy_pass       http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    # Optioneel: overige verzoeken via Node.js laten lopen (als Node.js ook
    # de HTML-bestanden serveert). Verwijder dit blok als Nginx zelf de
    # bestanden serveert vanuit de webroot hierboven.
    # location / {
    #     proxy_pass http://127.0.0.1:8080;
    # }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name claude.mediaextreme.nl;
    return 301 https://$host$request_uri;
}
